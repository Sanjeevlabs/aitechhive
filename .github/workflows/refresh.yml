name: Refresh AITechHive cards

on:
  schedule:
    # 8x per day — every 3h at :15, starting 01:15 UTC (06:45 IST)
    # Gemini 2.5 Flash free tier: 1500 req/day, 250k tokens/day.
    # Each run: 2-3 cards × 8 categories = ~20 new cards ≈ 25k tokens. Total: ~200k/day. Safe.
    - cron: '15 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: pipeline-deps-v3-${{ hashFiles('package-lock.json') }}
          restore-keys: pipeline-deps-v3-

      - name: Install pipeline deps
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Fetch RSS feeds
        run: node scripts/fetch-feeds.mjs

      - name: Enrich with LLM
        run: node scripts/enrich.mjs
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}

      - name: Generate sitemap
        run: node scripts/gen-sitemap.mjs
        env:
          NEXT_PUBLIC_APP_URL: https://aitechhive.com

      - name: Commit & push if changed
        run: |
          git config user.name "aitechhive-bot"
          git config user.email "bot@aitechhive.com"
          git add data/cards.json public/sitemap.xml
          if git diff --staged --quiet; then
            echo "No new content."
          else
            git commit -m "chore: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
