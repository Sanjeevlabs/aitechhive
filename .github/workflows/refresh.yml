name: Refresh AITechHive cards

on:
  schedule:
    # 8x per day — every 3h at :15, starting 01:15 UTC (06:45 IST)
    # Gemini free: 1500 req/day, 250k tokens/day. One refresh ≈ 3 req + ~8k tokens. Very safe.
    - cron: '15 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pipeline deps
        run: npm install rss-parser @anthropic-ai/sdk openai

      - name: Fetch RSS feeds
        run: node scripts/fetch-feeds.mjs

      - name: Enrich with LLM
        run: node scripts/enrich.mjs
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}

      - name: Generate sitemap
        run: node scripts/gen-sitemap.mjs
        env:
          NEXT_PUBLIC_APP_URL: https://aitechhive.com

      - name: Commit & push if changed
        run: |
          git config user.name "aitechhive-bot"
          git config user.email "bot@aitechhive.com"
          git add data/cards.json public/sitemap.xml
          if git diff --staged --quiet; then
            echo "No new content."
          else
            git commit -m "chore: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
