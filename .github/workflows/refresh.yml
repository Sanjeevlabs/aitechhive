name: Refresh AITechHive cards

on:
  schedule:
    # Twice daily: 23:30 + 11:30 UTC = 05:00 + 17:00 IST. 12h apart so
    # each refresh covers a half-cycle of US/EU market news. Primary is
    # Anthropic Haiku (~$0.06/call × 2 × 30 ≈ $4/month).
    - cron: '30 23,11 * * *'
  workflow_dispatch:
  # Auto-trigger on workflow OR pipeline-script edits. Repo is public
  # (unlimited Actions minutes), so a merge that touches the pipeline
  # should immediately re-run it and surface any breakage instead of
  # waiting for the next cron tick.
  push:
    branches: [main]
    paths:
      - '.github/workflows/refresh.yml'
      - 'scripts/**'
      - 'package-lock.json'

concurrency:
  group: refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 10min is plenty given Anthropic 2-min per-call timeout + Groq fallback
    # (PR #65). A run that exceeds this is definitely stuck — bail and free
    # the runner instead of burning CI minutes.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: pipeline-deps-v3-${{ hashFiles('package-lock.json') }}
          restore-keys: pipeline-deps-v3-

      - name: Install pipeline deps
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Fetch RSS feeds
        run: node scripts/fetch-feeds.mjs

      - name: Enrich with LLM
        # Soft-fail: a flaky LLM call should NOT fail the whole workflow
        # (and email the maintainer). Existing cards.json keeps serving.
        continue-on-error: true
        run: node scripts/enrich.mjs
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          # Anthropic Claude — used when LLM_PROVIDER=anthropic OR when
          # LLM_PROVIDER is unset (anthropic is the default in llm.mjs).
          # llm.mjs also falls back to ANTHROPIC_API_KEY if LLM_API_KEY is empty.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Groq fallback — kicks in only after primary provider exhausts retries.
          # Free tier: 30 req/min, ~5s inference on LPU hardware.
          # Set this in repo secrets to enable; the pipeline gracefully skips if absent.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}

      - name: Generate sitemap
        run: node scripts/gen-sitemap.mjs
        env:
          NEXT_PUBLIC_APP_URL: https://aitechhive.com

      - name: Commit & push if changed
        run: |
          git config user.name "aitechhive-bot"
          git config user.email "bot@aitechhive.com"
          git add data/cards.json public/sitemap.xml
          if git diff --staged --quiet; then
            echo "No new content."
          else
            git commit -m "chore: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
