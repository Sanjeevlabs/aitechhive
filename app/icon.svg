<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision" role="img" aria-label="AITechHive — honey bee">
  <!-- Wings: flat white with thin outline, tilted outward -->
  <ellipse cx="20" cy="20" rx="12" ry="8" fill="#FFFFFF" stroke="#1A1A1F" stroke-width="1.6" transform="rotate(-22 20 20)"/>
  <ellipse cx="44" cy="20" rx="12" ry="8" fill="#FFFFFF" stroke="#1A1A1F" stroke-width="1.6" transform="rotate(22 44 20)"/>

  <!-- Body: yellow rounded oval, flat fill -->
  <ellipse cx="32" cy="38" rx="16" ry="18" fill="#F5C518" stroke="#1A1A1F" stroke-width="2"/>

  <!-- Black stripes — two horizontal bands -->
  <rect x="16" y="32" width="32" height="5" fill="#1A1A1F"/>
  <rect x="17" y="44" width="30" height="5" fill="#1A1A1F"/>

  <!-- Head: solid black -->
  <circle cx="32" cy="20" r="8" fill="#1A1A1F"/>

  <!-- Eyes: white -->
  <circle cx="28.5" cy="19" r="1.8" fill="#FFFFFF"/>
  <circle cx="35.5" cy="19" r="1.8" fill="#FFFFFF"/>

  <!-- Antennae -->
  <path d="M28 13 Q26 8 24 6" stroke="#1A1A1F" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M36 13 Q38 8 40 6" stroke="#1A1A1F" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <circle cx="24" cy="6" r="1.6" fill="#1A1A1F"/>
  <circle cx="40" cy="6" r="1.6" fill="#1A1A1F"/>

  <!-- Stinger -->
  <path d="M32 56 L29.5 60 L34.5 60 Z" fill="#1A1A1F"/>
</svg>
