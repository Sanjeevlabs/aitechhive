<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision" role="img" aria-label="AITechHive — honey bee">
  <defs>
    <!-- 3D-feel gold: highlight top-left → shadow bottom-right -->
    <linearGradient id="body" x1="0.2" y1="0.1" x2="0.85" y2="0.95">
      <stop offset="0%" stop-color="#FFE07A"/>
      <stop offset="45%" stop-color="#F0AB22"/>
      <stop offset="100%" stop-color="#8E5808"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A8C5E0" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Wings (behind body, slightly translucent) -->
  <g opacity="0.95">
    <path d="M22 22 L6 14 Q2 24 10 30 L22 30 Z" fill="url(#wing)" stroke="rgba(35,25,55,0.22)" stroke-width="0.6" stroke-linejoin="round"/>
    <path d="M42 22 L58 14 Q62 24 54 30 L42 30 Z" fill="url(#wing)" stroke="rgba(35,25,55,0.22)" stroke-width="0.6" stroke-linejoin="round"/>
  </g>

  <!-- Hexagonal honey-bee body (literal hive geometry) -->
  <path d="M32 18 L46 26 L46 42 L32 50 L18 42 L18 26 Z" fill="url(#body)" stroke="#3A2400" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- Top facet — 3D highlight wrap -->
  <path d="M32 18 L46 26 L32 30 L18 26 Z" fill="rgba(255,255,255,0.22)"/>

  <!-- Black bands (slight curve suggests body wrap) -->
  <path d="M19 31 L45 31 L46 35 L18 35 Z" fill="#1A1A1F"/>
  <path d="M20 41 L44 41 L43 45 L21 45 Z" fill="#1A1A1F"/>

  <!-- Head -->
  <circle cx="32" cy="14" r="6.4" fill="url(#body)" stroke="#3A2400" stroke-width="0.6"/>
  <circle cx="32" cy="12" r="2.2" fill="rgba(255,255,255,0.25)"/>

  <!-- Eyes -->
  <circle cx="29.4" cy="13.4" r="1.4" fill="#1A1A1F"/>
  <circle cx="34.6" cy="13.4" r="1.4" fill="#1A1A1F"/>

  <!-- Antennae -->
  <path d="M30 9 Q28 5 26.5 3.5" stroke="#1A1A1F" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M34 9 Q36 5 37.5 3.5" stroke="#1A1A1F" stroke-width="1" stroke-linecap="round" fill="none"/>
  <circle cx="26.5" cy="3.5" r="1.1" fill="#1A1A1F"/>
  <circle cx="37.5" cy="3.5" r="1.1" fill="#1A1A1F"/>

  <!-- Stinger (subtle, bottom point of hex) -->
  <path d="M32 50 L31.4 53 L32.6 53 Z" fill="#3A2400"/>
</svg>
