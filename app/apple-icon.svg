<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" shape-rendering="geometricPrecision" role="img" aria-label="AITechHive">
  <!-- Full-bleed black tile (iOS auto-rounds the corners) -->
  <rect width="180" height="180" fill="#0E0D0C"/>
  <!-- White hexagon outline + kernel — high-contrast inverted variant -->
  <path d="M 90 32 L 142 60 L 142 120 L 90 148 L 38 120 L 38 60 Z"
        fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="90" cy="90" r="13.5" fill="#FFFFFF"/>
</svg>
