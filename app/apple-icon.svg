<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" shape-rendering="geometricPrecision" role="img" aria-label="AITechHive">
  <!-- Full-bleed black tile (iOS auto-rounds the corners) -->
  <rect width="180" height="180" fill="#0E0D0C"/>
  <g fill="#FFFFFF">
    <!-- Four wing-petals meeting at the body, forming an X silhouette -->
    <path d="M90 84 Q 62 40 28 62 Q 45 80 84 90 Z"/>
    <path d="M90 84 Q 118 40 152 62 Q 135 80 96 90 Z"/>
    <path d="M90 96 Q 62 140 28 118 Q 45 100 84 90 Z"/>
    <path d="M90 96 Q 118 140 152 118 Q 135 100 96 90 Z"/>
    <!-- Body: vertical oval centered -->
    <ellipse cx="90" cy="93" rx="7.5" ry="28"/>
    <!-- Head -->
    <circle cx="90" cy="56" r="7.5"/>
  </g>
  <!-- Negative-space stripes through the body -->
  <rect x="82" y="90" width="16" height="5" fill="#0E0D0C"/>
  <rect x="83" y="102" width="14" height="4.5" fill="#0E0D0C"/>
</svg>
